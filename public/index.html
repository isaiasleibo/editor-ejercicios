<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f14" />
<title>Matcher de Ejercicios</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header id="topbar" class="topbar">
    <button id="menu-toggle" class="menu-toggle" aria-label="Abrir lista">☰</button>
    <span class="topbar-title">Matcher</span>
  </header>

  <aside id="sidebar">
    <div class="side-head">
      <h1>Ejercicios de Claude</h1>
      <div id="stats" class="stats">cargando…</div>
      <input id="search" type="text" placeholder="Buscar en la lista…" autocomplete="off" />
      <div class="filters">
        <button data-filter="pending" class="active">Sin matchear</button>
        <button data-filter="matched">Matcheados</button>
        <button data-filter="all">Todos</button>
      </div>
      <div class="filters">
        <select id="filter-muscle">
          <option value="">Todos los músculos</option>
        </select>
      </div>
      <div id="list-count" class="list-count"></div>
    </div>
    <div id="list" class="list"></div>
  </aside>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <main id="editor">
    <div id="empty" class="empty">Seleccioná un ejercicio de Claude para buscarle imagen y video</div>

    <div id="panel" class="panel hidden">
      <header class="form-head">
        <div class="title-row">
          <span id="c-nombre_es" class="title-input static"></span>
          <button id="btn-delete" class="delete-btn">🗑 Eliminar</button>
          <button id="btn-next" class="next-btn">Siguiente sin matchear →</button>
        </div>
        <div class="sub-row">
          <span id="c-nombre_en" class="muted"></span>
          <span id="c-meta" class="muted"></span>
          <span id="c-id" class="muted"></span>
        </div>
      </header>

      <!-- Full info of the Claude exercise -->
      <section id="c-details" class="c-details"></section>

      <!-- Variant relationships -->
      <section id="variant-box" class="variant-box"></section>

      <!-- Current match (shown when this exercise already has media copied) -->
      <section id="current-match" class="current-match"></section>

      <section class="match-tabs">
        <button data-mtab="gym" class="active">🏋️ Gym workout</button>
        <button data-mtab="home">🏠 Home workout</button>
      </section>

      <section class="match-search">
        <input id="old-search" type="text" placeholder="Buscar ejercicio viejo que coincida…" autocomplete="off" />
        <select id="old-muscle">
          <option value="">Todos los músculos</option>
        </select>
      </section>

      <section class="match-body">
        <div id="candidates" class="candidates"></div>
        <div id="preview" class="preview">
          <div class="preview-empty">Elegí un candidato de la izquierda para ver imagen y video</div>
        </div>
      </section>

      <footer class="form-foot">
        <span id="save-status" class="muted"></span>
      </footer>
    </div>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
